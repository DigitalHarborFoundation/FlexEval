version: 2
updates:

- package-ecosystem: "uv"
  directory: "/"
  schedule:
    interval: "weekly"
  target-branch: "main"
  groups:
    # Batch all non-major updates into a single PR; majors stay separate
    # so they can be reviewed individually (and skipped by auto-merge).
    python-dependencies:
      patterns: ["*"]
      update-types: ["minor", "patch"]
